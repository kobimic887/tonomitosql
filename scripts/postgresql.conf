# Connection settings
listen_addresses = '*'
max_connections = 100

# Memory settings tuned for RDKit cartridge GiST index builds (~3M molecules)
shared_buffers = 2048MB
work_mem = 64MB
maintenance_work_mem = 2048MB
effective_cache_size = 4096MB

# WAL settings for faster bulk loading
wal_buffers = 64MB
checkpoint_completion_target = 0.9
max_wal_size = 2GB

# Logging
log_min_messages = warning
log_min_error_statement = error
